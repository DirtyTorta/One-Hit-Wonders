    // ── SUPABASE CLIENT ───────────────────────────────────────────────────────
    const SB = {
      url: window.SUPABASE_URL,
      key: window.SUPABASE_ANON_KEY,
      headers() {
        return {
          "apikey": this.key,

        };

      async get(table, query = "") {
        try {
          const r = await fetch(`${this.url}/rest/v1/${table}${query}`, { headers: this.headers() });
          return r.ok ? await r.json() : [];
        } catch { return []; }
      },
      async post(table, body, prefer = "") {

          const h = { ...this.headers() };
          if (prefer) h["Prefer"] = prefer;
          const r = await fetch(`${this.url}/rest/v1/${table}`, {

    // ── DEVICE FINGERPRINTING ─────────────────────────────────────────────────
    // Uses ONLY hardware-level signals that are identical across all browsers
    // on the same physical device (Chrome, Firefox, Samsung Browser, Safari etc.)
    // Stores the ID in both localStorage AND IndexedDB so it survives cache clears.

    async function hashStr(str) {
      const buf = await crypto.subtle.digest(
        "SHA-256",
        new TextEncoder().encode(str)
      );
      return Array.from(new Uint8Array(buf))
        .map(b => b.toString(16).padStart(2,"0"))
        .join("")
        .slice(0, 32);
    }

    // WebGL GPU string — most reliable cross-browser device signal
    function webglFingerprint() {
      try {
        const c  = document.createElement("canvas");
        const gl = c.getContext("webgl") || c.getContext("experimental-webgl");
        if (!gl) return "no-webgl";
        const ext      = gl.getExtension("WEBGL_debug_renderer_info");
        const renderer = ext ? gl.getParameter(ext.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER);
        const vendor   = ext ? gl.getParameter(ext.UNMASKED_VENDOR_WEBGL)   : gl.getParameter(gl.VENDOR);
        return `${vendor}::${renderer}`;
      } catch { return "no-webgl"; }
    }

    // IndexedDB read/write — persists across localStorage clears
    function idbGet(key) {
      return new Promise(resolve => {
        try {
          const req = indexedDB.open("ohw_store", 1);
          req.onupgradeneeded = e => e.target.result.createObjectStore("kv");
          req.onsuccess = e => {
            try {
              const r = e.target.result.transaction("kv","readonly").objectStore("kv").get(key);
              r.onsuccess = () => resolve(r.result || null);
              r.onerror   = () => resolve(null);
            } catch { resolve(null); }
          };
          req.onerror = () => resolve(null);
        } catch { resolve(null); }
      });
    }
    function idbSet(key, val) {
      try {
        const req = indexedDB.open("ohw_store", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("kv");
        req.onsuccess = e => {
          try { e.target.result.transaction("kv","readwrite").objectStore("kv").put(val, key); } catch {}
        };
      } catch {}
    }

    async function getVoterId() {
      // 1. Check IndexedDB first (survives localStorage clears, shared across tabs)
      const idbId = await idbGet("ohw_fp_id");
      if (idbId && idbId.length === 32) {
        try { localStorage.setItem("ohw_fp_id", idbId); } catch {}
        return idbId;
      }
      // 2. Check localStorage cache
      const lsId = localStorage.getItem("ohw_fp_id");
      if (lsId && lsId.length === 32) {
        idbSet("ohw_fp_id", lsId);
        return lsId;
      }

      try {
        // Only hardware signals — identical across Chrome/Firefox/Samsung/Safari on same device
        const signals = [
          // Display hardware
          screen.width, screen.height,
          screen.colorDepth, screen.pixelDepth,
          window.devicePixelRatio || 1,
          // CPU / RAM (device-level, not browser-level)
          navigator.hardwareConcurrency || 0,
          navigator.deviceMemory        || 0,
          // Touch hardware
          navigator.maxTouchPoints      || 0,
          // Timezone and locale (OS-level)
          Intl.DateTimeFormat().resolvedOptions().timeZone,
          navigator.language || "",
          // GPU — most unique and cross-browser stable signal
          webglFingerprint(),
          // OS platform hint
          navigator.platform || "",
          // Screen orientation capability
          screen.orientation?.type || "",
        ].join("|");

        const fp = await hashStr(signals);
        // Store in both so either survives the other being cleared
        localStorage.setItem("ohw_fp_id", fp);
        idbSet("ohw_fp_id", fp);
        return fp;
      } catch {
        // Last resort: random UUID stored in both
        let id = localStorage.getItem("ohw_voter_id") || await idbGet("ohw_voter_id");
        if (!id) {
          id = crypto.randomUUID?.() || Math.random().toString(36).slice(2) + Date.now().toString(36);
        }
        try { localStorage.setItem("ohw_voter_id", id); } catch {}
        idbSet("ohw_voter_id", id);
        return id;
      }
    }

    // ── BRACKET LOGIC ─────────────────────────────────────────────────────────
    function buildSeedMap(region) {
      const m = {};
      region.seeds.forEach(s => {
        m[s.seed] = { ...s, regionId: region.id, key: `${region.id}-${s.seed}` };
      });
      return m;
    }

    function getMatchupTeams(region, round, idx, winners) {
      const m = buildSeedMap(region);
      if (round === 0) { const [a,b] = R1_PAIRS[idx]; return [m[a], m[b]]; }
      return [
        winners[`${region.id}-${round-1}-${idx*2}`]   || null,
        winners[`${region.id}-${round-1}-${idx*2+1}`] || null,
      ];
    }

    function computeWinners(allVotes, deadlines, now) {
      const w = {};
      // Era rounds 0-3
      for (let r = 0; r <= 3; r++) {
        const dl = deadlines[r];
        if (!dl || now < new Date(dl).getTime()) break;
        REGIONS.forEach(region => {
          const cnt = [8,4,2,1][r];
          for (let i = 0; i < cnt; i++) {
            const key = `${region.id}-${r}-${i}`;
            const [t1, t2] = getMatchupTeams(region, r, i, w);
            if (!t1 || !t2) continue;
            const v = allVotes[key] || {};
            w[key] = (v[t1.key]||0) >= (v[t2.key]||0) ? t1 : t2;
          }
        });
      }
      // Finals
      const fDl = deadlines[4];
      if (fDl && now >= new Date(fDl).getTime()) {
        const e70=w["rockalt-3-0"], e90=w["hiphop-3-0"], e80=w["pop-3-0"], e00=w["dance-3-0"];
        if (e70&&e90) { const v=allVotes["ff-0"]||{}; w["ff-0"]=(v[e70.key]||0)>=(v[e90.key]||0)?e70:e90; }
        if (e80&&e00) { const v=allVotes["ff-1"]||{}; w["ff-1"]=(v[e80.key]||0)>=(v[e00.key]||0)?e80:e00; }
        if (w["ff-0"]&&w["ff-1"]) {
          const a=w["ff-0"],b=w["ff-1"],v=allVotes["ff-champ"]||{};
          w["ff-champ"] = (v[a.key]||0)>=(v[b.key]||0) ? a : b;
        }
      }
      return w;
    }

    function getCurrentRound(deadlines, now) {
      if (!deadlines[0]) return -1;
      for (let r = 0; r <= 4; r++) {
        if (!deadlines[r]) return -1;
        if (now < new Date(deadlines[r]).getTime()) return r;
      }
      return 5;
    }

    // ── HELPERS ───────────────────────────────────────────────────────────────
    function fmtCountdown(ms) {
      if (ms <= 0) return "CLOSED";
      const d=Math.floor(ms/86400000), h=Math.floor((ms%86400000)/3600000),
            m=Math.floor((ms%3600000)/60000), s=Math.floor((ms%60000)/1000);
      if (d > 0) return `${d}d ${h}h ${m}m`;
      if (h > 0) return `${h}h ${m}m ${s}s`;
      return `${m}m ${s}s`;
    }
    function padN(n) { return String(n).padStart(2,"0"); }
    function toLocalISO(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return `${d.getFullYear()}-${padN(d.getMonth()+1)}-${padN(d.getDate())}T${padN(d.getHours())}:${padN(d.getMinutes())}`;

    // ── GLOBAL AUDIO TRACKER (stops previous song when new one plays) ─────────
    let globalAudio = null;

    // ── SONG ROW ──────────────────────────────────────────────────────────────
    function SongRow({ team, winner, mVotes, myVote, canVote, showResults, onVote, color }) {
      const [previewOpen, setPreviewOpen] = useState(false);
      const [previewUrl,  setPreviewUrl]  = useState(null);
      const [loading,     setLoading]     = useState(false);
      const [isPlaying,   setIsPlaying]   = useState(false);
      const [noPreview,   setNoPreview]   = useState(false);
      const [progress,    setProgress]    = useState(0);
      const audioRef = useRef(null);

      if (!team) return <div style={{ height: 64, background: "#0f0f1a", borderLeft: "4px solid #1a1a2e" }} />;

      const isWinner = winner?.key === team.key;
      const isMyPick = myVote === team.key;
      const hi       = isWinner || isMyPick;
      const vCount   = mVotes[team.key] || 0;
      const total    = Object.values(mVotes).reduce((a,b) => a+b, 0);
      const pct      = total > 0 ? Math.round((vCount/total)*100) : 0;

      // Uses team.hint when set (overrides auto-search for songs with common names
      // or special characters that iTunes gets wrong), otherwise auto-cleans the query
      const getCleanQuery = (song, artist, hint) => {
        if (hint) return encodeURIComponent(hint);
        const cleanSong   = song.split("/")[0].split("(")[0].trim();
        const cleanArtist = artist.split("ft.")[0].split("feat.")[0].trim();
        return encodeURIComponent(`${cleanSong} ${cleanArtist}`);
      };

      // Gemini: try user's regional iTunes store first, fall back to US
      // Fixes preview gaps for users in AU, DE, GB, CA etc.
      const fetchWithRetry = async (query, signal) => {
        const regions = USER_REGION !== "US" ? [USER_REGION, "US"] : ["US"];
        for (const country of regions) {
          try {
            const res = await fetch(
              `https://itunes.apple.com/search?term=${query}&entity=song&limit=1&country=${country}`,
              { signal }
            );
            const dat = await res.json();
            const url = dat.results?.[0]?.previewUrl;
            if (url) return url;
          } catch { throw new Error("aborted"); }
        }
        return null;
      };

      const stopAudio = () => {
        if (audioRef.current) { audioRef.current.pause(); audioRef.current.currentTime = 0; }
        setIsPlaying(false); setProgress(0);
      };

      const fetchAndPlay = async () => {
        if (globalAudio && globalAudio !== audioRef.current) {
          globalAudio.pause(); globalAudio.currentTime = 0;
        }

        // ── SAFARI GESTURE FIX ────────────────────────────────────────────────
        // Safari requires new Audio() to be called SYNCHRONOUSLY inside the click
        // handler. Any code after an `await` is no longer in the gesture context,
        // so we create the audio object here first — before the fetch — then set
        // src later. This is the correct fix for iOS Safari autoplay blocking.
        if (!audioRef.current) {
          const a = new Audio();
          a.ontimeupdate = () => {
            setProgress(Math.min(100, (a.currentTime / Math.min(30, a.duration || 30)) * 100));
          };
          a.onended = () => { setIsPlaying(false); setProgress(0); };
          audioRef.current = a;
        }

        let url = previewUrl;
        if (!url) {
          setLoading(true);
          try {
            const q          = getCleanQuery(team.song, team.artist, team.hint);
            const controller = new AbortController();
            const timer      = setTimeout(() => controller.abort(), 8000);
            url = await fetchWithRetry(q, controller.signal);
            clearTimeout(timer);
            if (url) setPreviewUrl(url);
            else { setNoPreview(true); setLoading(false); return; }
          } catch { setNoPreview(true); setLoading(false); return; }
          setLoading(false);
        }

        // Audio object already gesture-blessed — just set src and play
        audioRef.current.src = url;
        globalAudio = audioRef.current;
        try {
          await audioRef.current.play();
          setIsPlaying(true);
        } catch {
          setIsPlaying(false);
          setNoPreview(true);
        }
      };

      const togglePlay = () => {
        if (isPlaying) { audioRef.current?.pause(); setIsPlaying(false); }
        else fetchAndPlay();
      };

      const handleListen = () => {
        if (previewOpen) { stopAudio(); setPreviewOpen(false); }
        else { setPreviewOpen(true); }
      };

      return (
        <div className="bracket-card" style={S.card(color, hi)}>
          {/* Song info */}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
            <div style={{ flex:1, minWidth:0, paddingRight:8 }}>
              <div style={{ fontSize:11, color:"#6a6a8a", marginBottom:2 }}>#{team.seed} · {team.artist}</div>
              <div style={{ fontSize:15, fontWeight: hi?800:500, color: hi?color:"#dde", lineHeight:1.3,
                overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                {team.song}
              </div>
            </div>
            {isWinner && (
              <span style={{ fontSize:10, background:color, color:"#050510", borderRadius:4,
                padding:"2px 6px", fontWeight:800, flexShrink:0 }}>ADV</span>
            )}
          </div>

          {/* Buttons row */}
          <div style={{ display:"flex", gap:8, marginBottom: previewOpen ? 8 : 0 }}>
            {/* Preview toggle */}
            <button
              onClick={handleListen}
              style={{ ...S.btn(previewOpen ? color : "transparent", previewOpen ? "#050510" : color, `${color}80`), flex:1 }}>
              {previewOpen ? "▼ CLOSE" : "▶ LISTEN"}
            </button>

            {/* Vote */}
            {canVote && (
              <button
                onClick={() => onVote(team)}
                style={{ ...S.btn(color, "#050510", color), flex:1, fontWeight:800 }}>
                VOTE
              </button>
            )}

            {/* Already voted chip */}
            {isMyPick && !winner && !canVote && (
              <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center",
                background:`${color}18`, borderRadius:7, fontSize:13, fontWeight:700, color }}>
                ✓ VOTED
              </div>
            )}
          </div>

          {/* Vote bar */}
          {showResults && total > 0 && (
            <div style={{ display:"flex", alignItems:"center", gap:8, marginTop: previewOpen ? 0 : 4 }}>
              <div style={{ flex:1, height:4, background:"#1a1a2e", borderRadius:2, overflow:"hidden" }}>
                <div style={{ width:`${pct}%`, height:"100%", background:color, transition:"width 0.6s" }} />
              </div>
              <span style={{ fontSize:12, fontWeight:700, color: hi?color:"#5a5a7a", minWidth:36, textAlign:"right" }}>
                {pct}%
              </span>
            </div>
          )}

          {/* iTunes preview player */}
          {previewOpen && (
            <div style={{ marginTop:8, background:"#0a0a18", borderRadius:8, padding:"12px",
              border:`1px solid ${color}30` }}>
              {loading ? (
                <div style={{ textAlign:"center", color:"#6a6a8a", fontSize:13, padding:"6px 0" }}>
                  🔍 Finding preview...
                </div>
              ) : noPreview ? (
                <div style={{ textAlign:"center", fontSize:12 }}>
                  <div style={{ color:"#6a6a8a", marginBottom:8 }}>No preview available in {USER_REGION}</div>
                  <a href={`https://www.youtube.com/results?search_query=${encodeURIComponent(team.song + ' ' + team.artist)}`}
                    target="_blank" rel="noreferrer"
                    style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"8px 14px",
                      background:"#ff0000", borderRadius:7, color:"#fff", textDecoration:"none",
                      fontWeight:700, fontSize:12 }}>
                    ▶ Search on YouTube
                  </a>
                </div>
              ) : (
                <div>
                  {/* Play/pause + progress */}
                  <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                    <button onClick={togglePlay}
                      style={{ ...S.btn(color, "#050510", color), minWidth:44, fontSize:18, padding:"6px 10px" }}>
                      {isPlaying ? "⏸" : "▶"}
                    </button>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:11, color:"#6a6a8a", marginBottom:4 }}>
                        {isPlaying ? "🎵 Playing preview..." : "Tap ▶ to preview"}
                      </div>
                      <div style={{ height:4, background:"#1a1a2e", borderRadius:2, overflow:"hidden" }}>
                        <div style={{ width:`${progress}%`, height:"100%", background:color,
                          transition: isPlaying ? "width 0.5s linear" : "none" }} />
                      </div>
                    </div>
                    <a href={`https://www.youtube.com/results?search_query=${encodeURIComponent(team.song + ' ' + team.artist)}`}
                      target="_blank" rel="noreferrer"
                      style={{ fontSize:18, textDecoration:"none" }} title="Search on YouTube">
                      📺
                    </a>
                  </div>
                  <div style={{ fontSize:10, color:"#3a3a5a", marginTop:6, textAlign:"center" }}>
                    30-sec preview via Apple Music · 📺 for full song on YouTube
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ── MATCHUP ───────────────────────────────────────────────────────────────
    function Matchup({ mKey, t1, t2, winner, roundOpen, allVotes, myVote, onVote, color }) {
      const canVote    = roundOpen && !!t1 && !!t2 && !myVote && !winner;
      const showResults = !!myVote || !!winner;
      const mVotes     = allVotes[mKey] || {};
      const total      = Object.values(mVotes).reduce((a,b) => a+b, 0);

      return (
        <div style={{ borderRadius:10, overflow:"hidden",
          border:`1px solid ${winner ? color+"60" : canVote ? color+"30" : "#1e1e30"}`,
          boxShadow: winner ? `0 0 16px ${color}18` : "none" }}>
          <SongRow team={t1} winner={winner} mVotes={mVotes} myVote={myVote}
            canVote={canVote} showResults={showResults} onVote={t => onVote(mKey,t)} color={color} />
          <div style={{ height:1, background:"#141420" }} />
          <SongRow team={t2} winner={winner} mVotes={mVotes} myVote={myVote}
            canVote={canVote} showResults={showResults} onVote={t => onVote(mKey,t)} color={color} />
          {showResults && total > 0 && (
            <div style={{ padding:"4px 12px", background:"#060610", fontSize:10, color:"#3a3a5a", textAlign:"center" }}>
              {total.toLocaleString()} votes · {mVotes[t1?.key]||0} vs {mVotes[t2?.key]||0}
            </div>
          )}
        </div>
      );
    }

    // ── ERA TAB ───────────────────────────────────────────────────────────────
    function EraTab({ region, currentRound, winners, allVotes, myVotes, onVote }) {
      const color = ERA_COLORS[region.id];
      // Completed rounds are collapsed by default — user can expand if they want to review
      const [expanded, setExpanded] = useState({});

      // Auto-scroll to active round when tab changes
      const activeRef = React.useRef(null);
      useEffect(() => {
        if (activeRef.current) {
          setTimeout(() => {
            activeRef.current.scrollIntoView({ behavior:"smooth", block:"start" });
          }, 100);
        }
      }, [region.id, currentRound]);

      return (
        <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
          {[0,1,2,3].map(round => {
            const count    = [8,4,2,1][round];
            const isActive = currentRound === round || (currentRound === -1 && round === 0);
            const isDone   = currentRound > round;
            const isLocked = !isActive && !isDone && currentRound > -1;
            const isOpen   = expanded[round];

            // For done rounds: show winner summary cards instead of full matchups
            const advancers = isDone
              ? Array.from({length: count}, (_,i) => winners[`${region.id}-${round}-${i}`]).filter(Boolean)
              : [];

            return (
              <section key={round} ref={isActive ? activeRef : null}>
                {/* Round header — clickable to expand/collapse done rounds */}
                <div
                  onClick={() => isDone && setExpanded(p => ({...p,[round]:!p[round]}))}
                  style={{
                    display:"flex", alignItems:"center", gap:10, marginBottom: isDone && !isOpen ? 0 : 12,
                    padding:"10px 14px", borderRadius:8,
                    background: isActive ? `${color}18` : isDone ? "#0d0d1a" : "#0a0a14",
                    border:`1px solid ${isActive ? color+"50" : isDone ? "#1e1e2e" : "#1a1a2a"}`,
                    cursor: isDone ? "pointer" : "default",
                    userSelect: "none",
                  }}>
                  <div style={{ fontFamily:"'Bebas Neue', sans-serif", letterSpacing:"0.1em",
                    fontSize:15, flex:1,
                    color: isActive ? color : isDone ? "#4a4a6a" : "#2a2a4a" }}>
                    {ROUND_NAMES[round]}
                  </div>
                  {isDone && (
                    <span style={{ fontSize:10, color:"#3a3a5a", marginRight:4 }}>
                      {advancers.length} advanced
                    </span>
                  )}
                  <span style={{ fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:4,
                    background: isActive?`${color}25`:isDone?"#1a1a2a":"#0d0d1a",
                    color: isActive?color:isDone?"#4a4a6a":"#2a2a4a",
                    border:`1px solid ${isActive?color+"40":"#1a1a2a"}` }}>
                    {isActive ? "● VOTING NOW" : isDone ? (isOpen ? "▲ HIDE" : "▼ SHOW") : "LOCKED"}
                  </span>
                </div>

                {/* DONE round: collapsed summary or expanded matchups */}
                {isDone && !isOpen && (
                  <div style={{ display:"flex", flexWrap:"wrap", gap:6, paddingBottom:4 }}>
                    {advancers.map((team, idx) => team && (
                      <div key={idx} style={{
                        padding:"4px 10px", borderRadius:6, fontSize:11, fontWeight:600,
                        background:`${color}15`, border:`1px solid ${color}30`, color:`${color}cc`,
                      }}>
                        ✓ {team.song}
                      </div>
                    ))}
                  </div>
                )}

                {/* DONE round expanded — show full matchups for review */}
                {isDone && isOpen && (
                  <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                    {Array.from({ length:count }, (_,i) => {
                      const mKey = `${region.id}-${round}-${i}`;
                      const [t1,t2] = getMatchupTeams(region, round, i, winners);
                      return (
                        <Matchup key={i} mKey={mKey} t1={t1} t2={t2}
                          winner={winners[mKey]||null} roundOpen={false}
                          allVotes={allVotes} myVote={myVotes[mKey]}
                          onVote={onVote} color={color} />
                      );
                    })}
                  </div>
                )}

                {/* ACTIVE round — always fully visible */}
                {isActive && (
                  <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                    {Array.from({ length:count }, (_,i) => {
                      const mKey = `${region.id}-${round}-${i}`;
                      const [t1,t2] = getMatchupTeams(region, round, i, winners);
                      return (
                        <Matchup key={i} mKey={mKey} t1={t1} t2={t2}
                          winner={winners[mKey]||null} roundOpen={true}
                          allVotes={allVotes} myVote={myVotes[mKey]}
                          onVote={onVote} color={color} />
                      );
                    })}
                  </div>
                )}

                {/* LOCKED round */}
                {isLocked && (
                  <div style={{ padding:"14px", textAlign:"center", color:"#3a3a5a", fontSize:12,
                    background:"#0a0a14", borderRadius:8, border:"1px dashed #1a1a2a" }}>
                    Opens after {ROUND_NAMES[round-1]} closes
                  </div>
                )}
              </section>
            );
          })}
        </div>
      );
    }

    // ── FINALS TAB ────────────────────────────────────────────────────────────
    function FinalsTab({ currentRound, winners, allVotes, myVotes, onVote }) {
      const e70=winners["rockalt-3-0"], e90=winners["hiphop-3-0"];
      const e80=winners["pop-3-0"],  e00=winners["dance-3-0"];

      if (!e70 && !e80 && !e90 && !e00) return (
        <div style={{ padding:"32px 0", textAlign:"center", color:"#5a5a8a", fontSize:13, lineHeight:1.8 }}>

        </div>
      );

      const semis = [
        { label:"SEMIFINAL 1", sub:"Rock & Alt Champion vs Hip-Hop & R&B Champion",   t1:e70,t2:e90,mKey:"ff-0",  color:"#ff6b6b" },
        { label:"SEMIFINAL 2", sub:"Pop Champion vs Dance & Electronic Champion", t1:e80,t2:e00,mKey:"ff-1",  color:"#ff9f43" },
      ];

      return (
        <div style={{ display:"flex", flexDirection:"column", gap:24 }}>
          {semis.map(({ label,sub,t1,t2,mKey,color }) => (

              <div style={{ textAlign:"center", marginBottom:10 }}>
                <div style={{ fontSize:11, color:"#5a5a7a", marginBottom:3 }}>{sub}</div>
                <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:20, letterSpacing:"0.1em" }}>{label}</div>
              </div>
              <Matchup mKey={mKey} t1={t1} t2={t2} winner={winners[mKey]||null}
                roundOpen={open} allVotes={allVotes} myVote={myVotes[mKey]}
                onVote={onVote} color={color} />
            </div>
          ))}

          <div>
            <div style={{ textAlign:"center", marginBottom:10 }}>
              <div style={{ fontSize:11, color:"#ffd32a80", marginBottom:3 }}>ULTIMATE MATCHUP</div>
              <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:22, color:"#ffd32a", letterSpacing:"0.12em" }}>
                🏆 CHAMPIONSHIP
              </div>
            </div>
            <Matchup mKey="ff-champ" t1={winners["ff-0"]||null} t2={winners["ff-1"]||null}
              winner={champ||null} roundOpen={open} allVotes={allVotes}
              myVote={myVotes["ff-champ"]} onVote={onVote} color="#ffd32a" />
          </div>

          {champ && (
            <div style={{ background:"linear-gradient(135deg,#1a1400,#2a2000)",
              border:"1px solid #ffd32a50", borderRadius:12, padding:24, textAlign:"center",
              boxShadow:"0 0 40px #ffd32a18" }}>
              <div style={{ fontSize:40, marginBottom:8 }}>🏆</div>
              <div style={{ fontSize:11, letterSpacing:"0.15em", color:"#ffd32a80", marginBottom:6 }}>
                GREATEST ONE HIT WONDER OF ALL TIME
              </div>
              <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:24, color:"#ffd32a", letterSpacing:"0.1em" }}>
                {champ.artist}
              </div>
              <div style={{ fontSize:15, color:"#ffca00", marginTop:4 }}>"{champ.song}"</div>
            </div>
          )}
        </div>
      );
    }

    // ── ROUND BANNER ──────────────────────────────────────────────────────────
    function RoundBanner({ deadlines, now, currentRound, totalVotes }) {
      if (currentRound === -1) return (
        <div style={{ padding:"14px 16px", background:"#0d0d1a", border:"1px dashed #2a2a4e",
          borderRadius:10, textAlign:"center", marginBottom:16 }}>
          <div style={{ fontSize:13, color:"#5a5a8a" }}>⏳ Voting hasn't opened yet — check back soon!</div>
        </div>
      );
      if (currentRound === 5) return (
        <div style={{ padding:"14px 16px", background:"linear-gradient(135deg,#1a1400,#2a2000)",
          border:"1px solid #ffd32a50", borderRadius:10, textAlign:"center", marginBottom:16 }}>
          <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:16, color:"#ffd32a", letterSpacing:"0.1em" }}>
            🏆 BRACKET COMPLETE — CHAMPION CROWNED!
          </div>
        </div>
      );

      const colors = ["#ff9f43","#ff4d94","#26e8c0","#b48eff","#ffd32a"];
      const color  = colors[currentRound];
      const remaining = deadlines[currentRound] ? new Date(deadlines[currentRound]).getTime()-now : 0;
      const urgent    = remaining > 0 && remaining < 3600000;

      return (
        <div style={{ background:`linear-gradient(135deg,#0d0d1a,${color}12)`,
          border:`1px solid ${color}40`, borderRadius:10, padding:"12px 16px", marginBottom:16 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8 }}>
            <div>
              <div style={{ fontSize:10, color, letterSpacing:"0.1em", opacity:0.8, marginBottom:2 }}>NOW VOTING</div>
              <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:19, letterSpacing:"0.08em" }}>
                Round {currentRound+1} — {currentRound <= 3 ? ROUND_NAMES[currentRound] : "Finals"}
              </div>
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontSize:10, color:"#5a5a7a", marginBottom:2 }}>CLOSES IN</div>
              <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:22,
                color: urgent ? "#ff4d94" : color }}>
                {fmtCountdown(remaining)}
              </div>
            </div>
          </div>
          <div style={{ borderTop:"1px solid #1a1a2a", marginTop:8, paddingTop:6,
            display:"flex", justifyContent:"space-between", fontSize:11, color:"#4a4a6a" }}>
            <span>🗳 {totalVotes.toLocaleString()} votes cast</span>
            <span>updates every 15s</span>
          </div>
        </div>
      );
    }

    // ── ADMIN PANEL ───────────────────────────────────────────────────────────
    function AdminPanel({ deadlines, onSave, onClose }) {
      const [local,  setLocal]  = useState(() => {
        const d = {};
        for (let i=0;i<=4;i++) d[i] = toLocalISO(deadlines[i]) || "";
        return d;
      });
      const [saving, setSaving] = useState(false);
      const [saved,  setSaved]  = useState(false);
      const labels = ["Round of 64","Round of 32","Sweet 16","Elite 8","Finals"];

      const save = async () => {
        setSaving(true);
        const p = {};
        for (let i=0;i<=4;i++) if (local[i]) p[i] = new Date(local[i]).toISOString();
        for (let i=1;i<=4;i++) {
          if (p[i] && p[i-1] && new Date(p[i]) <= new Date(p[i-1])) {
            alert(`Round ${i+1} must close AFTER Round ${i}!`);
            setSaving(false); return;
          }
        }
        await onSave(p);
        setSaving(false); setSaved(true); setTimeout(() => setSaved(false), 2500);
      };

      return (
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:200,
          display:"flex",alignItems:"center",justifyContent:"center",padding:16 }}>
          <div style={{ background:"#0e0e1e",border:"1px solid #3a3a6e",borderRadius:14,
            padding:24,maxWidth:400,width:"100%",maxHeight:"90vh",overflowY:"auto" }}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16 }}>
              <div style={{ fontFamily:"'Bebas Neue',sans-serif",fontSize:17,color:"#b48eff",letterSpacing:"0.1em" }}>
                ⚙ SET ROUND DEADLINES
              </div>
              <button onClick={onClose} style={{ background:"transparent",border:"1px solid #2a2a4a",
                color:"#5a5a7a",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:14 }}>✕</button>
            </div>
            <p style={{ fontSize:11,color:"#5a5a7a",marginBottom:16,lineHeight:1.6 }}>
              When each deadline hits, winners auto-calculate from vote counts and the next round opens automatically.
            </p>
            {[0,1,2,3,4].map(i => (
              <div key={i} style={{ marginBottom:14 }}>
                <div style={{ fontSize:11,fontWeight:700,color:"#c0c0d8",letterSpacing:"0.05em",marginBottom:5 }}>
                  ROUND {i+1}: {labels[i]}
                </div>
                <input type="datetime-local" value={local[i]}
                  onChange={e => setLocal(p => ({...p,[i]:e.target.value}))}
                  style={{ width:"100%",background:"#12121e",border:"1px solid #2a2a4e",
                    color:"#fff",borderRadius:8,padding:"10px 12px",fontSize:14,outline:"none" }} />
                {local[i] && (
                  <div style={{ fontSize:10,color:"#6a6a8a",marginTop:3 }}>
                    → {new Date(local[i]).toLocaleString()}
                  </div>
                )}
              </div>
            ))}
            <div style={{ display:"flex",gap:10,marginTop:18 }}>
              <button onClick={save} disabled={saving}
                style={{ flex:1,background:saved?"#26e8c0":"#b48eff",border:"none",color:"#050510",
                  borderRadius:8,padding:12,fontSize:14,fontWeight:800,cursor:"pointer",
                  fontFamily:"'Bebas Neue',sans-serif",letterSpacing:"0.1em" }}>
                {saving?"SAVING…":saved?"✓ SAVED!":"SAVE DEADLINES"}
              </button>
              <button onClick={onClose} style={{ background:"transparent",border:"1px solid #2a2a4a",
                color:"#6a6a8a",borderRadius:8,padding:"12px 16px",fontSize:14,cursor:"pointer" }}>
                CLOSE
              </button>
            </div>
            <div style={{ marginTop:10,fontSize:10,color:"#2a2a4a",textAlign:"center" }}>
              PIN: bootiful · keep this private
            </div>
          </div>
        </div>
      );
    }

    // ── PIN GATE ──────────────────────────────────────────────────────────────
    function PinGate({ onSuccess, onCancel }) {
      const [val, setVal] = useState(""), [err, setErr] = useState(false);
      const check = () => {
        if (val === ADMIN_PIN) onSuccess();
        else { setErr(true); setTimeout(() => setErr(false), 600); setVal(""); }
      };
      return (
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:199,
          display:"flex",alignItems:"center",justifyContent:"center" }}>
          <div style={{ background:"#0e0e1e",border:"1px solid #3a3a6e",borderRadius:14,
            padding:28,maxWidth:280,width:"100%",textAlign:"center" }}>
            <div style={{ fontFamily:"'Bebas Neue',sans-serif",fontSize:17,color:"#b48eff",
              letterSpacing:"0.15em",marginBottom:16 }}>⚙ ADMIN ACCESS</div>
            <input type="password" value={val} placeholder="Enter PIN"
              onChange={e => setVal(e.target.value)}
              onKeyDown={e => e.key === "Enter" && check()}
              style={{ width:"100%",background:err?"#1a0a0a":"#12121e",
                border:`1px solid ${err?"#ff4d94":"#2a2a4e"}`,color:"#fff",
                borderRadius:8,padding:12,fontSize:16,outline:"none",
                textAlign:"center",letterSpacing:"0.3em",marginBottom:14,transition:"all 0.2s" }} />
            <div style={{ display:"flex",gap:10 }}>
              <button onClick={check} style={{ flex:1,background:"#b48eff",border:"none",color:"#050510",
                borderRadius:8,padding:12,fontSize:14,fontWeight:800,cursor:"pointer",
                fontFamily:"'Bebas Neue',sans-serif",letterSpacing:"0.1em" }}>ENTER</button>
              <button onClick={onCancel} style={{ background:"transparent",border:"1px solid #2a2a4a",
                color:"#5a5a7a",borderRadius:8,padding:"12px 14px",fontSize:14,cursor:"pointer" }}>✕</button>
            </div>
          </div>
        </div>
      );
    }

    // ── SHARE PANEL ───────────────────────────────────────────────────────────
    function SharePanel({ currentRound, champ }) {
      const [open, setOpen] = useState(false);
      const [copied, setCopied] = useState(false);
      const url = window.location.href;
      const txt = champ
        ? `🏆 "${champ.song}" by ${champ.artist} is the Greatest One Hit Wonder of All Time! 🎵`
        : currentRound === -1
        ? `🎵 Vote in my One Hit Wonder Bracket — 64 songs across 4 genres!`
        : `🎵 Round ${currentRound+1} of my One Hit Wonder Bracket is LIVE! Vote before it closes!`;
      const tag = "#OneHitWonder #music";

      const plats = [
        { label:"Bluesky",   icon:"🦋", color:"#0085ff", featured:true,
          href:`https://bsky.app/intent/compose?text=${encodeURIComponent(`${txt} ${url} ${tag}`)}` },
        { label:"X/Twitter", icon:"𝕏",  color:"#1a1a1a",
          href:`https://twitter.com/intent/tweet?text=${encodeURIComponent(`${txt} ${tag}`)}&url=${encodeURIComponent(url)}` },
        { label:"Facebook",  icon:"f",  color:"#1877f2",
          href:`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}` },
        { label:"Reddit",    icon:"👾", color:"#ff4500",
          href:`https://reddit.com/submit?url=${encodeURIComponent(url)}&title=${encodeURIComponent(txt)}` },
        { label:"WhatsApp",  icon:"💬", color:"#25d366",
          href:`https://api.whatsapp.com/send?text=${encodeURIComponent(`${txt} ${url}`)}` },
        { label:"Threads",   icon:"@",  color:"#101010",
          href:`https://www.threads.net/intent/post?text=${encodeURIComponent(`${txt} ${url} ${tag}`)}` },
      ];

      const copy = () => {
        navigator.clipboard?.writeText(url).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
      };

      return (
        <div style={{ position:"relative" }}>
          <div style={{ display:"flex", gap:8 }}>
            <a href={plats[0].href} target="_blank" rel="noreferrer"
              style={{ display:"inline-flex",alignItems:"center",gap:6,background:"#0085ff",
                color:"#fff",borderRadius:8,padding:"8px 12px",fontSize:12,fontWeight:700,
                textDecoration:"none",flexShrink:0,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:"0.08em" }}>
              🦋 BLUESKY
            </a>
            <button onClick={() => setOpen(o => !o)}
              style={{ background:"transparent",border:"1px solid #3a3a5a",color:"#8a8aaa",
                borderRadius:8,padding:"8px 12px",fontSize:12,cursor:"pointer" }}>
              {open ? "✕" : "↗ MORE"}
            </button>
          </div>

          {open && (
            <div style={{ position:"absolute",top:"calc(100% + 8px)",right:0,zIndex:100,
              background:"#0e0e1e",border:"1px solid #2a2a4e",borderRadius:12,
              padding:14,boxShadow:"0 8px 32px rgba(0,0,0,0.8)",minWidth:210 }}>
              {plats.map(p => (
                <a key={p.label} href={p.href} target="_blank" rel="noreferrer"
                  style={{ display:"flex",alignItems:"center",gap:10,padding:"8px 10px",
                    borderRadius:8,marginBottom:4,
                    background:p.featured?"#0085ff14":"transparent",
                    border:`1px solid ${p.featured?"#0085ff30":"#151522"}`,
                    color:"#cccce0",textDecoration:"none" }}>
                  <span style={{ width:24,height:24,background:p.color,borderRadius:6,
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:11,fontWeight:900,color:"#fff",flexShrink:0 }}>{p.icon}</span>
                  <span style={{ fontSize:13,fontWeight:600,color:p.featured?"#0085ff":"#cccce0" }}>
                    {p.label}
                  </span>
                </a>
              ))}
              <div style={{ borderTop:"1px solid #151522",marginTop:8,paddingTop:8 }}>
                <button onClick={copy}
                  style={{ width:"100%",background:copied?"#26e8c014":"transparent",
                    border:`1px solid ${copied?"#26e8c0":"#2a2a4a"}`,
                    color:copied?"#26e8c0":"#6a6a8a",borderRadius:8,padding:9,
                    fontSize:13,cursor:"pointer",fontWeight:600 }}>
                  {copied ? "✓ COPIED!" : "📋 COPY LINK"}
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── MAIN APP ──────────────────────────────────────────────────────────────
    function App() {
      const [tab,       setTab]       = useState("rockalt");
      const [allVotes,  setAllVotes]  = useState({});
      const [myVotes,   setMyVotes]   = useState({});
      const [deadlines, setDeadlines] = useState({});
      const [now,       setNow]       = useState(Date.now());
      const [loaded,    setLoaded]    = useState(false);
      const [pinOpen,   setPinOpen]   = useState(false);
      const [adminOpen, setAdminOpen] = useState(false);
      const [voterId, setVoterId] = useState("");

      // Clock
      useEffect(() => {
        const t = setInterval(() => setNow(Date.now()), 1000);
        return () => clearInterval(t);
      }, []);

      // Load votes + deadlines from Supabase, refresh every 15s
      const loadData = useCallback(async () => {
        const [votesRaw, dlRaw] = await Promise.all([
          SB.get("votes", "?select=matchup_key,song_key"),
          SB.get("deadlines", "?select=round,closes_at"),
        ]);

        // Aggregate votes: { matchupKey: { songKey: count } }
        const agg = {};
        if (Array.isArray(votesRaw)) {
          votesRaw.forEach(({ matchup_key, song_key }) => {
            if (!agg[matchup_key]) agg[matchup_key] = {};
            agg[matchup_key][song_key] = (agg[matchup_key][song_key]||0) + 1;
          });
        }
        setAllVotes(agg);

        // Deadlines: { 0: ISO, 1: ISO, ... }
        if (Array.isArray(dlRaw)) {
          const d = {};
          dlRaw.forEach(({ round, closes_at }) => { d[round] = closes_at; });
          setDeadlines(d);
        }
      }, []);

      useEffect(() => {
        const init = async () => {
          // Load fingerprint voter ID
          const fid = await getVoterId();
          setVoterId(fid);
          // Load my votes from localStorage
          try {
            const mv = JSON.parse(localStorage.getItem("ohw_my_votes") || "{}");
            setMyVotes(mv);
          } catch {}
          try { await loadData(); } catch {}
          setLoaded(true);
        };
        init();
        const t = setInterval(loadData, 15000);
        return () => clearInterval(t);
      }, [loadData]);

      const winners      = useMemo(() => computeWinners(allVotes, deadlines, now), [allVotes,deadlines,now]);
      const currentRound = useMemo(() => getCurrentRound(deadlines, now), [deadlines,now]);

      const totalVotes = useMemo(() => {
        if (currentRound < 0 || currentRound > 4) return 0;
        let n = 0;
        if (currentRound <= 3) {
          const cnt = [8,4,2,1][currentRound];
          REGIONS.forEach(r => {
            for (let i=0;i<cnt;i++)
              Object.values(allVotes[`${r.id}-${currentRound}-${i}`]||{}).forEach(x => n+=x);
          });
        } else {
          ["ff-0","ff-1","ff-champ"].forEach(k =>
            Object.values(allVotes[k]||{}).forEach(x => n+=x));
        }
        return n;
      }, [allVotes, currentRound]);

      const castVote = useCallback(async (mKey, team) => {
        if (myVotes[mKey]) return;
        // Save locally
        const newMV = { ...myVotes, [mKey]: team.key };
        setMyVotes(newMV);
        try { localStorage.setItem("ohw_my_votes", JSON.stringify(newMV)); } catch {}
        // Optimistic update
        setAllVotes(p => {
          const n = { ...p, [mKey]: {...(p[mKey]||{})} };
          n[mKey][team.key] = (n[mKey][team.key]||0) + 1;
          return n;
        });
        // Persist to Supabase
        await SB.post("votes",
          { matchup_key: mKey, song_key: team.key, voter_id: voterId },
          "resolution=ignore-duplicates"
        );
      }, [myVotes, voterId]);

      const saveDeadlines = useCallback(async parsed => {
        setDeadlines(parsed);
        await Promise.all(
          Object.entries(parsed).map(([round, closes_at]) =>
            SB.post("deadlines", { round: parseInt(round), closes_at }, "resolution=merge-duplicates")
          )
        );
      }, []);

      const tabs = [
        ...REGIONS.map(r => ({ id:r.id, label:`${r.emoji} ${r.name}`, color:ERA_COLORS[r.id] })),
        { id:"finals", label:"🏆 Finals", color:"#ffd32a" },
      ];

      if (!loaded) return (
        <div style={{ minHeight:"100vh",display:"flex",flexDirection:"column",
          alignItems:"center",justifyContent:"center",gap:16 }}>
          <div style={{ fontSize:48 }}>🎵</div>
          <div style={{ fontSize:13,color:"#4a4a7a",letterSpacing:"0.1em" }}>Loading bracket…</div>
        </div>
      );

      return (
        <div>
          {pinOpen   && <PinGate onSuccess={() => { setPinOpen(false); setAdminOpen(true); }} onCancel={() => setPinOpen(false)} />}
          {adminOpen && <AdminPanel deadlines={deadlines} onSave={saveDeadlines} onClose={() => setAdminOpen(false)} />}

          {/* Sticky header */}
          <div className="sticky-top">
            {/* Top bar */}
            <div style={{ padding:"12px 16px",background:"linear-gradient(135deg,#08080f,#100820)",
              borderBottom:"1px solid #1a1a2e",
              display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap" }}>
              <div>
                <div style={{ fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:"0.08em",
                  background:"linear-gradient(90deg,#ff9f43,#ff4d94,#26e8c0,#b48eff)",
                  WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent" }}>
                  🎵 ONE HIT WONDER BRACKET
                </div>
                <div style={{ fontSize:10,color:"#5a5a7a",marginTop:1 }}>64 songs · 4 genres · 1 chance at glory</div>
              </div>
              <div style={{ display:"flex",gap:8,alignItems:"center" }}>
                <SharePanel currentRound={currentRound} champ={winners["ff-champ"]} />
                <button onClick={() => setPinOpen(true)}
                  style={{ background:"transparent",border:"1px solid #2a2a4a",color:"#5a5a7a",
                    borderRadius:8,padding:"8px 12px",fontSize:12,cursor:"pointer" }}>
                  ⚙
                </button>
              </div>
            </div>

            {/* Era tabs — progress-aware, high-DPI friendly */}
            <nav style={{ display:"flex", overflowX:"auto", background:"#0a0a14",
              borderBottom:"1px solid #1a1a2e", padding:"8px 10px", gap:8 }}>
              {tabs.map(t => {
                const active = tab === t.id;
                // Count how many matchups this voter has voted in for this era
                const eraRegion    = REGIONS.find(r => r.id === t.id);
                const displayRound = currentRound === -1 ? 0 : currentRound;
                const totalMatchups = eraRegion && displayRound <= 3
                  ? [8,4,2,1][displayRound] : 0;
                const votedMatchups = eraRegion && totalMatchups > 0
                  ? Array.from({length: totalMatchups}, (_,i) =>
                      myVotes[`${t.id}-${displayRound}-${i}`] ? 1 : 0
                    ).reduce((a,b) => a+b, 0)
                  : 0;
                const allDone   = totalMatchups > 0 && votedMatchups === totalMatchups;
                const hasVoted  = votedMatchups > 0;
                const isFinals  = t.id === "finals";

                const needsVote = !isFinals && totalMatchups > 0 && votedMatchups === 0;

                return (
                  <button key={t.id} onClick={() => setTab(t.id)}
                    style={{
                      flexShrink: 0,
                      padding: "10px 14px",
                      background: active ? `${t.color}22` : allDone ? `${t.color}10` : needsVote ? `${t.color}15` : "#0f0f1a",
                      border: `2px solid ${active ? t.color : allDone ? `${t.color}60` : needsVote ? t.color : "#1e1e30"}`,
                      borderRadius: 10,
                      color: active ? t.color : allDone ? `${t.color}cc` : needsVote ? t.color : hasVoted ? "#8a8aaa" : "#5a5a7a",
                      fontWeight: 800,
                      cursor: "pointer",
                      fontSize: 13,
                      whiteSpace: "nowrap",
                      fontFamily: "'Bebas Neue', sans-serif",
                      letterSpacing: "0.08em",
                      transition: "all 0.2s",
                      boxShadow: active ? `0 0 12px ${t.color}30` : needsVote ? `0 0 10px ${t.color}40` : "none",
                      transform: active ? "translateY(-1px)" : "none",
                      position: "relative",
                    }}>
                    {/* Completion checkmark badge */}
                    {allDone && !isFinals && (
                      <span style={{
                        position:"absolute", top:-6, right:-6,
                        background:"#26e8c0", color:"#050510",
                        borderRadius:"50%", width:16, height:16,
                        display:"flex", alignItems:"center", justifyContent:"center",
                        fontSize:9, fontWeight:900, fontFamily:"'Inter',sans-serif",
                        boxShadow:"0 0 6px #26e8c080",
                      }}>✓</span>
                    )}
                    {/* Pulsing alert dot for unvoted regions */}
                    {needsVote && !active && (
                      <span style={{
                        position:"absolute", top:-5, right:-5,
                        background: t.color, borderRadius:"50%",
                        width:12, height:12,
                        boxShadow:`0 0 8px ${t.color}`,
                        animation:"pulse-dot 1.4s ease-in-out infinite",
                      }} />
                    )}
                    {t.label}
                    {/* Progress sub-label */}
                    {!isFinals && totalMatchups > 0 && (
                      <span style={{
                        display:"block", fontSize:9, marginTop:2,
                        fontFamily:"'Inter',sans-serif", fontWeight:700,
                        letterSpacing:"0.03em",
                        color: allDone ? "#26e8c0" : needsVote ? t.color : active ? `${t.color}cc` : "#4a4a6a",
                      }}>
                        {allDone ? "✓ ALL VOTED" : needsVote ? "⚡ VOTE NOW!" : `${votedMatchups}/${totalMatchups} VOTED`}
                      </span>
                    )}
                    {active && !allDone && totalMatchups > 0 && (
                      <span style={{
                        display:"block", fontSize:8, marginTop:1,
                        fontFamily:"'Inter',sans-serif", fontWeight:600,
                        color:`${t.color}99`, letterSpacing:"0.03em",
                      }}>TAP TO VOTE ↓</span>
                    )}
                  </button>
                );
              })}
            </nav>
          </div>

          {/* Main content */}
          <main style={{ padding:16, maxWidth:640, margin:"0 auto" }}>
            <RoundBanner deadlines={deadlines} now={now} currentRound={currentRound} totalVotes={totalVotes} />

            {/* "Don't forget other divisions" nudge */}
            {currentRound >= 0 && currentRound <= 3 && (() => {
              const totalMatchups = [8,4,2,1][currentRound];
              const unvotedEras = REGIONS.filter(r => {
                const voted = Array.from({length:totalMatchups}, (_,i) =>
                  myVotes[`${r.id}-${currentRound}-${i}`] ? 1 : 0
                ).reduce((a,b)=>a+b,0);
                return voted === 0; // hasn't voted at all in this era
              });
              const currentEraVoted = (() => {
                if (tab === "finals") return false;
                const voted = Array.from({length:totalMatchups}, (_,i) =>
                  myVotes[`${tab}-${currentRound}-${i}`] ? 1 : 0
                ).reduce((a,b)=>a+b,0);
                return voted > 0;
              })();
              // Only show nudge if: currently in an era tab, have voted here, and other eras have zero votes
              if (!currentEraVoted || unvotedEras.length === 0 || tab === "finals") return null;
              return (
                <div style={{
                  marginBottom: 16, padding:"12px 14px",
                  background:"#0f0f1a", border:"1px solid #ffd32a40",
                  borderRadius:10, display:"flex", alignItems:"flex-start", gap:10,
                }}>
                  <span style={{fontSize:18, flexShrink:0}}>👆</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13, fontWeight:700, color:"#ffd32a", marginBottom:6}}>
                      Don't forget the other divisions!
                    </div>
                    <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
                      {unvotedEras.map(r => (
                        <button key={r.id} onClick={() => setTab(r.id)}
                          style={{
                            padding:"6px 12px", borderRadius:8, fontSize:12, fontWeight:700,
                            background:`${ERA_COLORS[r.id]}22`,
                            border:`1px solid ${ERA_COLORS[r.id]}60`,
                            color:ERA_COLORS[r.id], cursor:"pointer",
                            fontFamily:"'Bebas Neue',sans-serif", letterSpacing:"0.06em",
                          }}>
                          {r.emoji} {r.name} — 0 votes cast →
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              );
            })()}
            {tab === "finals"
              ? <FinalsTab currentRound={currentRound} winners={winners}
                  allVotes={allVotes} myVotes={myVotes} onVote={castVote} />
              : <EraTab region={REGIONS.find(r => r.id === tab)} currentRound={currentRound}
                  winners={winners} allVotes={allVotes} myVotes={myVotes} onVote={castVote} />
            }
          </main>
        </div>
      );
    }

    // ── ERROR BOUNDARY ────────────────────────────────────────────────────────
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(e) { return { error: e }; }
      render() {
        if (this.state.error) return (
          <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column",
            alignItems:"center", justifyContent:"center", gap:16, padding:24, textAlign:"center" }}>
            <div style={{ fontSize:48 }}>⚠️</div>
            <div style={{ fontSize:18, fontWeight:700, color:"#ff6b6b" }}>Something went wrong</div>
            <div style={{ fontSize:13, color:"#6a6a8a", maxWidth:300 }}>
              Try refreshing the page. If the problem persists, clear your browser cache.
            </div>
            <button onClick={() => window.location.reload()}
              style={{ padding:"10px 24px", background:"#ff6b6b", color:"#fff",
                border:"none", borderRadius:8, fontWeight:700, cursor:"pointer", fontSize:14 }}>
              Refresh Page
            </button>
          </div>
        );
        return this.props.children;
      }
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
